<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Dashboard</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

            .card:hover {
                transform: scale(1.05);
            }

        .container {
            margin-top: 80px;
        }

        .btn-custom {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container text-center">
        <h1 class="mb-4">🚀 E-Commerce API Dashboard</h1>
        <p class="mb-5">Manage and explore your API easily</p>

        <div class="row">

            <!-- Swagger -->
            <div class="col-md-3">
                <div class="card bg-dark p-3">
                    <h3><i class="bi bi-gear-fill"></i></h3>
                    <h5>Swagger UI</h5>
                    <p>Test all APIs</p>
                    <a href="/swagger" class="btn btn-primary btn-custom">Open</a>
                </div>
            </div>

            <!-- Products -->
            <div class="col-md-3">
                <div class="card bg-success p-3">
                    <h3><i class="bi bi-box-seam"></i></h3>
                    <h5>Products</h5>
                    <p>View all products</p>
                    <a href="/api/Product" class="btn btn-light btn-custom">View</a>
                </div>
            </div>

            <!-- Customers -->
            <div class="col-md-3">
                <div class="card bg-warning text-dark p-3">
                    <h3><i class="bi bi-people-fill"></i></h3>
                    <h5>Customers</h5>
                    <p>View all customers</p>
                    <a href="/api/Customer" class="btn btn-dark btn-custom">View</a>
                </div>
            </div>

            <!-- Orders -->
            <div class="col-md-3">
                <div class="card bg-danger p-3">
                    <h3><i class="bi bi-cart-check-fill"></i></h3>
                    <h5>Orders</h5>
                    <p>View all orders</p>
                    <a href="/api/Order" class="btn btn-light btn-custom">View</a>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="mt-5">
            <p>💻 Developed using ASP.NET Core Web API</p>
        </div>
    </div>

</body>
</html>
